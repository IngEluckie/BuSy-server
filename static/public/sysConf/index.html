<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración global | BuSy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="settings-shell" aria-label="Configuración global de Business System">
        <header class="app-header">
            <div class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                    <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2.06 2.06 0 1 1-2.91 2.91l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56v.17a2.06 2.06 0 1 1-4.12 0v-.09a1.7 1.7 0 0 0-1.11-1.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2.06 2.06 0 1 1-2.91-2.91l.06-.06a1.7 1.7 0 0 0 .34-1.88 1.7 1.7 0 0 0-1.56-1.03H2.5a2.06 2.06 0 1 1 0-4.12h.09a1.7 1.7 0 0 0 1.6-1.11 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2.06 2.06 0 1 1 2.91-2.91l.06.06a1.7 1.7 0 0 0 1.88.34h.08A1.7 1.7 0 0 0 9.75 2.8v-.17a2.06 2.06 0 1 1 4.12 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2.06 2.06 0 1 1 2.91 2.91l-.06.06a1.7 1.7 0 0 0-.34 1.88v.08a1.7 1.7 0 0 0 1.56 1.03h.17a2.06 2.06 0 1 1 0 4.12h-.09A1.7 1.7 0 0 0 19.4 15Z"/>
                </svg>
            </div>
            <h1>Ventana de configuración de Business System</h1>
        </header>

        <div class="app-body">
            <aside class="sidebar" aria-label="Secciones de configuración">
                <nav class="section-tabs" aria-label="Menú de configuración">
                    <button class="tab-button is-active" type="button" data-section="system" aria-label="Información del sistema" aria-pressed="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v8A1.5 1.5 0 0 1 18.5 15h-13A1.5 1.5 0 0 1 4 13.5v-8Z"/>
                            <path d="M8 20h8M12 15v5"/>
                        </svg>
                    </button>
                    <button class="tab-button" type="button" data-section="company" aria-label="Empresa" aria-pressed="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 21V7l8-4 8 4v14"/>
                            <path d="M9 21v-7h6v7M8 9h.01M12 9h.01M16 9h.01"/>
                        </svg>
                    </button>
                    <button class="tab-button" type="button" data-section="settings" aria-label="Preferencias globales" aria-pressed="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/>
                            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2.06 2.06 0 1 1-2.91 2.91l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56v.17a2.06 2.06 0 1 1-4.12 0v-.09a1.7 1.7 0 0 0-1.11-1.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2.06 2.06 0 1 1-2.91-2.91l.06-.06a1.7 1.7 0 0 0 .34-1.88 1.7 1.7 0 0 0-1.56-1.03H2.5a2.06 2.06 0 1 1 0-4.12h.09a1.7 1.7 0 0 0 1.6-1.11 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2.06 2.06 0 1 1 2.91-2.91l.06.06a1.7 1.7 0 0 0 1.88.34h.08A1.7 1.7 0 0 0 9.75 2.8v-.17a2.06 2.06 0 1 1 4.12 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2.06 2.06 0 1 1 2.91 2.91l-.06.06a1.7 1.7 0 0 0-.34 1.88v.08a1.7 1.7 0 0 0 1.56 1.03h.17a2.06 2.06 0 1 1 0 4.12h-.09A1.7 1.7 0 0 0 19.4 15Z"/>
                        </svg>
                    </button>
                    <button class="tab-button" type="button" data-section="users" aria-label="Usuarios" aria-pressed="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/>
                            <path d="M9.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </button>
                </nav>

                <a class="help-card" href="info.md" aria-label="¿Necesitas ayuda? Ver documentación">
                    <span class="help-icon">?</span>
                    <span class="help-tooltip" aria-hidden="true">
                        <strong>¿Necesitas ayuda?</strong>
                        <small>Ver documentación</small>
                    </span>
                </a>
            </aside>

            <section class="content-area" aria-live="polite">
                <div id="sectionContent" class="content-card"></div>
            </section>
        </div>

        <footer class="action-bar">
            <button class="save-button" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/>
                    <path d="M17 21v-8H7v8M7 3v5h8"/>
                </svg>
                <span>Salir y Guardar</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
