<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Inicia sesión en BuSy">
    <title>BuSy · Iniciar sesión</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <main class="page">
        <section class="shell" aria-label="Inicio de sesión">
            <aside class="brand" aria-hidden="true">
                <div class="brand__mark" role="presentation">BuSy</div>
                <h1 class="brand__title">Business System</h1>
                <p class="brand__subtitle">Accede a tu panel para gestionar inventario, ventas y sincronización.</p>
                <ul class="brand__bullets">
                    <li>Rápido y seguro</li>
                    <li>Diseño limpio</li>
                    <li>Listo para móvil</li>
                </ul>
            </aside>

            <section class="card" aria-label="Formulario de inicio de sesión">
                <header class="card__header">
                    <h2 class="card__title">Iniciar sesión</h2>
                    <p class="card__hint">Usa tu usuario y contraseña.</p>
                </header>

                <form id="loginForm" class="form" autocomplete="on">
                    <div class="field">
                        <label class="label" for="username">Usuario</label>
                        <input
                            class="input"
                            id="username"
                            name="username"
                            type="text"
                            inputmode="text"
                            autocomplete="username"
                            placeholder="tu_usuario"
                            required
                        >
                    </div>

                    <div class="field">
                        <div class="labelRow">
                            <label class="label" for="password">Contraseña</label>
                            <button class="link" type="button" id="togglePw" aria-controls="password" aria-pressed="false">
                                Mostrar
                            </button>
                        </div>
                        <input
                            class="input"
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="row">
                        <a class="link" href="#" aria-disabled="true" tabindex="-1">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="alert" id="alert" role="status" aria-live="polite" hidden></div>

                    <button class="btn" id="submitBtn" type="submit">
                        Entrar
                    </button>

                    <p class="footnote">
                        Al continuar aceptas las políticas de uso internas de tu organización.
                    </p>
                </form>
            </section>
        </section>
    </main>
</body>
</html>
