services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: busy-app
    init: true
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      BUSY_ARCHIVE_PATH: "/workspace/.busy.zip"
      BUSY_RUNTIME_DIR: "/tmp/busy-runtime"
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
      - ./main.py:/app/main.py
      - ./routers:/app/routers
      - ./utilities:/app/utilities
      - ./databases:/app/databases
      - ./static:/app/static
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
